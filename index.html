<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    
    <!-- ═══ iPhone/iPad Viewport (关键：不禁用缩放，但设置初始为1) ═══ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ═══ PWA / iOS 主屏安装 meta tags ═══ -->
    <!-- 让 App 以全屏模式运行（无 Safari UI）-->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- 状态栏颜色：black-translucent 让内容延伸到刘海区域 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- 主屏图标名称 -->
    <meta name="apple-mobile-web-app-title" content="时间大师" />
    <!-- 主屏触控图标 -->
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <!-- 也为标准 Android PWA 添加图标 -->
    <link rel="icon" type="image/png" href="/icon.png" />
    
    <!-- ═══ PWA Manifest ═══ -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- ═══ Theme Color（地址栏 / 状态栏颜色）═══ -->
    <meta name="theme-color" content="#0a0a0c" />
    
    <!-- ═══ 防止 iOS 自动电话号码识别 ═══ -->
    <meta name="format-detection" content="telephone=no" />
    
    <title>DT 时间管理大师 2026</title>
    
    <!-- ═══ Service Worker 注册 ═══ -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] Registered:', reg.scope))
            .catch(err => console.warn('[SW] Registration failed:', err));
          
          // 监听 SW 消息（离线队列触发）
          navigator.serviceWorker.addEventListener('message', (event) => {
            if (event.data?.type === 'PROCESS_SYNC_QUEUE') {
              window.dispatchEvent(new CustomEvent('dt-process-sync-queue'));
            }
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
